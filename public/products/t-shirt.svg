<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f5f5f5" rx="8"/>
  <!-- sleeves -->
  <polygon points="30,40 70,60 65,100 40,100" fill="#9e9e9e"/>
  <polygon points="170,40 130,60 135,100 160,100" fill="#9e9e9e"/>
  <!-- body -->
  <rect x="65" y="55" width="70" height="105" rx="2" fill="#bdbdbd"/>
  <!-- collar -->
  <path d="M80,40 Q100,60 120,40" fill="none" stroke="#9e9e9e" stroke-width="4" stroke-linecap="round"/>
  <!-- left shoulder seam -->
  <line x1="30" y1="40" x2="80" y2="40" stroke="#9e9e9e" stroke-width="4" stroke-linecap="round"/>
  <!-- right shoulder seam -->
  <line x1="120" y1="40" x2="170" y2="40" stroke="#9e9e9e" stroke-width="4" stroke-linecap="round"/>
</svg>

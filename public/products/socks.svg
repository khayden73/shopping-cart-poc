<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f5f5f5" rx="8"/>
  <!-- sock body (leg) -->
  <rect x="75" y="25" width="50" height="85" rx="10" fill="#bdbdbd"/>
  <!-- ribbed cuff stripes -->
  <rect x="75" y="30" width="50" height="6" rx="2" fill="#9e9e9e"/>
  <rect x="75" y="40" width="50" height="6" rx="2" fill="#9e9e9e"/>
  <rect x="75" y="50" width="50" height="6" rx="2" fill="#9e9e9e"/>
  <!-- heel turn -->
  <path d="M75,110 Q75,145 95,145 L125,145 L125,110 Z" fill="#bdbdbd"/>
  <!-- heel accent -->
  <path d="M75,125 Q75,145 95,145 L105,145 L105,125 Z" fill="#9e9e9e"/>
  <!-- foot -->
  <rect x="95" y="130" width="65" height="35" rx="17" fill="#bdbdbd"/>
  <!-- toe -->
  <ellipse cx="158" cy="147" rx="15" ry="18" fill="#9e9e9e"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f5f5f5" rx="8"/>
  <!-- sleeves -->
  <rect x="28" y="65" width="38" height="75" rx="10" fill="#9e9e9e"/>
  <rect x="134" y="65" width="38" height="75" rx="10" fill="#9e9e9e"/>
  <!-- body -->
  <rect x="60" y="65" width="80" height="100" rx="4" fill="#bdbdbd"/>
  <!-- hood -->
  <path d="M72,65 Q72,28 100,25 Q128,28 128,65" fill="#bdbdbd" stroke="#9e9e9e" stroke-width="2"/>
  <!-- hood opening -->
  <path d="M82,65 Q82,38 100,36 Q118,38 118,65" fill="#e0e0e0"/>
  <!-- kangaroo pocket -->
  <rect x="76" y="120" width="48" height="28" rx="4" fill="#9e9e9e"/>
  <!-- front zipper line -->
  <line x1="100" y1="65" x2="100" y2="120" stroke="#757575" stroke-width="2" stroke-dasharray="4,3"/>
</svg>

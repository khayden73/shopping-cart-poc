<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f5f5f5" rx="8"/>
  <!-- waistband -->
  <rect x="45" y="30" width="110" height="18" rx="3" fill="#9e9e9e"/>
  <!-- belt loops -->
  <rect x="60" y="27" width="8" height="12" rx="2" fill="#757575"/>
  <rect x="132" y="27" width="8" height="12" rx="2" fill="#757575"/>
  <!-- left leg -->
  <path d="M45,48 L45,165 Q55,170 75,165 L95,95 L95,48 Z" fill="#bdbdbd"/>
  <!-- right leg -->
  <path d="M105,48 L105,95 L125,165 Q145,170 155,165 L155,48 Z" fill="#bdbdbd"/>
  <!-- crotch seam -->
  <path d="M95,48 Q100,80 105,48" fill="#b0b0b0"/>
  <!-- center seam -->
  <line x1="100" y1="48" x2="100" y2="95" stroke="#9e9e9e" stroke-width="1.5"/>
</svg>
